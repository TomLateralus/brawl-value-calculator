<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Deal Comparator v7</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Arial;background:#111;color:white;text-align:center;padding:15px;}
.deals {display:flex;gap:10px;flex-wrap:wrap;}
.deal {flex:1;min-width:300px;background:#1a1a1a;padding:10px;border-radius:10px;}
input,select {width:90%;margin:5px;padding:10px;border-radius:8px;border:none;}
button {padding:12px;width:95%;background:#ffcc00;border:none;border-radius:10px;font-weight:bold;}
canvas {max-width:100%;}
</style>
</head>

<body>

<h2>🔥 Brawl Deal Comparator v7</h2>

<div class="deals">
<div class="deal">
<h3>Deal A</h3>
<input id="gemsA" placeholder="Gems">
<input id="coinsA" placeholder="Coins">
<input id="ppA" placeholder="PP">
<input id="blingA" placeholder="Bling">
<input id="creditsA" placeholder="Credits">
<input id="priceA" placeholder="Price">
<div id="outA1"></div>
<div id="outA2"></div>
<canvas id="chartA"></canvas>
</div>

<div class="deal">
<h3>Deal B</h3>
<input id="gemsB" placeholder="Gems">
<input id="coinsB" placeholder="Coins">
<input id="ppB" placeholder="PP">
<input id="blingB" placeholder="Bling">
<input id="creditsB" placeholder="Credits">
<input id="priceB" placeholder="Price">
<div id="outB1"></div>
<div id="outB2"></div>
<canvas id="chartB"></canvas>
</div>
</div>

<select id="t1">
<option value="aud">AUD</option>
<option value="gems">Gems</option>
<option value="coins">Coins</option>
<option value="pp">PP</option>
<option value="bling">Bling</option>
<option value="credits">Credits</option>
</select>

<select id="t2">
<option value="gems">Gems</option>
<option value="aud">AUD</option>
<option value="coins">Coins</option>
<option value="pp">PP</option>
<option value="bling">Bling</option>
<option value="credits">Credits</option>
</select>

<button onclick="calc()">Compare</button>

<div id="winner" style="margin-top:15px;font-size:20px;"></div>

<script>
const V={g:0.10,c:0.01,p:0.02,b:0.0030303,cr:0.0181818181818181818};

function get(id){return +document.getElementById(id).value||0}

function val(g,c,p,b,cr){return g*V.g+c*V.c+p*V.p+b*V.b+cr*V.cr}

function conv(a,t){
if(t==="gems")return a/V.g;
if(t==="coins")return a/V.c;
if(t==="pp")return a/V.p;
if(t==="bling")return a/V.b;
if(t==="credits")return a/V.cr;
return a;
}

let chartA,chartB;

function makeChart(ctx,data){
return new Chart(ctx,{type:"pie",data:{
labels:["Gems","Coins","PP","Bling","Credits"],
datasets:[{data:data}]
}});
}

function update(chart,ctx,data){
if(chart){chart.data.datasets[0].data=data;chart.update();return chart;}
return makeChart(ctx,data);
}

function calc(){

let a=val(get("gemsA"),get("coinsA"),get("ppA"),get("blingA"),get("creditsA"));
let b=val(get("gemsB"),get("coinsB"),get("ppB"),get("blingB"),get("creditsB"));

let rA=a/(get("priceA")||1);
let rB=b/(get("priceB")||1);

let t1v=document.getElementById("t1").value;
let t2v=document.getElementById("t2").value;

outA1.innerText=conv(a,t1v).toFixed(2);
outA2.innerText=conv(a,t2v).toFixed(2);
outB1.innerText=conv(b,t1v).toFixed(2);
outB2.innerText=conv(b,t2v).toFixed(2);

let brA=[get("gemsA")*V.g,get("coinsA")*V.c,get("ppA")*V.p,get("blingA")*V.b,get("creditsA")*V.cr];
let brB=[get("gemsB")*V.g,get("coinsB")*V.c,get("ppB")*V.p,get("blingB")*V.b,get("creditsB")*V.cr];

chartA=update(chartA,document.getElementById("chartA"),brA);
chartB=update(chartB,document.getElementById("chartB"),brB);

if(Math.abs(rA-rB)<0.05) winner.innerText="⚖️ Very Similar";
else winner.innerText=rA>rB?"🏆 Deal A Better":"🏆 Deal B Better";
}

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
